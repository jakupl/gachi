<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Watcher - Direct</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; width: 300px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #64748b; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: #f1f5f9; }
        .error { color: #ef4444; background: #fef2f2; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #fee2e2; }
        .info { color: #2563eb; font-style: italic; text-align: center; margin: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Panel Cen (Bez Proxy)</h1>

    <div class="search-box">
        <input type="text" id="steamIdInput" placeholder="Wklej Steam ID">
        <button class="btn-blue" onclick="loadInventory()">Filtruj Ekwipunek</button>
        <button class="btn-gray" onclick="resetTable()">Pokaż Wszystko</button>
    </div>

    <div id="status"></div>

    <table id="priceTable" style="display:none;">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
    const DB_URL = 'https://enwwdqjsxqwspvtsubou.supabase.co/rest/v1/prices?apikey=sb_publishable_n_ms66jti5mt9p_9H0cDAg_rA-4IiFM&select=*';
    
    // USTAWIENIE: Nazwa kolumny w Twoim Supabase
    const DB_COLUMN = 'name'; 

    let fullData = [];

    // Pobieranie z Supabase
    async function fetchDB() {
        try {
            const res = await fetch(DB_URL);
            fullData = await res.json();
            render(fullData);
        } catch (e) {
            showError("Błąd bazy Supabase: " + e.message);
        }
    }

    async function loadInventory() {
        const id = document.getElementById('steamIdInput').value.trim();
        if (!id) return alert("Wpisz Steam ID!");

        document.getElementById('status').innerHTML = '<p class="info">Pobieranie bezpośrednio ze Steam...</p>';
        
        try {
            // BEZ PROXY - zadziała tylko jeśli przeglądarka nie blokuje CORS 
            // (np. z wtyczką "Allow CORS" lub lokalnie)
            const res = await fetch(`https://steamcommunity.com/inventory/${id}/730/2?l=english&count=2000`);
            
            if (!res.ok) throw new Error("Steam zablokował zapytanie (CORS/Rate Limit).");

            const steamData = await res.json();
            const invNames = (steamData.descriptions || []).map(i => i.market_hash_name.trim().toLowerCase());

            // POPRAWIONE DOPASOWANIE (Fuzzy Match)
            const filtered = fullData.filter(dbItem => {
                const nameInDb = String(dbItem[DB_COLUMN] || "").trim().toLowerCase();
                return invNames.includes(nameInDb);
            });

            if (filtered.length === 0) {
                showError("Znaleziono ekwipunek, ale żadna nazwa nie pasuje do bazy. Sprawdź wielkość liter lub nazwy w Supabase.");
                console.log("Przykładowa nazwa ze Steam:", invNames[0]);
                console.log("Przykładowa nazwa z bazy:", fullData[0][DB_COLUMN]);
            } else {
                document.getElementById('status').innerHTML = "";
                render(filtered);
            }
        } catch (e) {
            showError("Błąd pobierania: " + e.message + ". <br><small>GitHub Pages blokuje bezpośrednie połączenie ze Steam (CORS). Musisz użyć proxy lub wtyczki do przeglądarki.</small>");
        }
    }

    function render(data) {
        const table = document.getElementById('priceTable');
        const thead = document.getElementById('thead');
        const tbody = document.getElementById('tbody');
        
        if (!data.length) return;

        thead.innerHTML = ""; tbody.innerHTML = "";
        const cols = Object.keys(data[0]);

        let hRow = "<tr>";
        cols.forEach(c => hRow += `<th>${c}</th>`);
        thead.innerHTML = hRow + "</tr>";

        data.forEach(item => {
            let bRow = "<tr>";
            cols.forEach(c => bRow += `<td>${item[c] ?? '-'}</td>`);
            tbody.innerHTML += bRow + "</tr>";
        });
        table.style.display = "table";
    }

    function resetTable() {
        document.getElementById('status').innerHTML = "";
        render(fullData);
    }

    function showError(m) {
        document.getElementById('status').innerHTML = `<div class="error">${m}</div>`;
        document.getElementById('priceTable').style.display = "none";
    }

    fetchDB();
</script>
</body>
</html>
