<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualne Ceny CS:GO / CS2</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
        }

        h1 { 
            text-align: center; 
            color: var(--primary-color); 
            margin-bottom: 24px;
        }

        /* --- Nowa sekcja dla Steam ID --- */
        .steam-filter {
            background-color: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 300px;
            font-size: 1rem;
        }

        button {
            padding: 10px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #1d4ed8; }
        
        button.reset-btn {
            background-color: #64748b;
        }
        button.reset-btn:hover { background-color: #475569; }
        /* -------------------------------- */

        .table-wrapper { overflow-x: auto; }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }

        th, td { 
            padding: 14px 16px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
        }

        th { 
            background-color: var(--primary-color); 
            color: white; 
            font-weight: 600;
            text-transform: capitalize;
        }

        tr:hover { background-color: #f1f5f9; }

        .loader { 
            text-align: center; 
            padding: 40px; 
            font-size: 1.1em;
            color: #64748b; 
        }

        .error { 
            color: #ef4444; 
            text-align: center; 
            padding: 20px;
            font-weight: bold; 
            background-color: #fef2f2;
            border-radius: 8px;
        }

        .footer { 
            text-align: center; 
            margin-top: 24px; 
            font-size: 0.9em; 
            color: #64748b; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Panel Aktualnych Cen</h1>
        
        <div class="steam-filter">
            <input type="text" id="steamIdInput" placeholder="Wklej Steam ID (np. 76561198289016347)">
            <button onclick="filterBySteamInventory()">Pokaż moje przedmioty</button>
            <button class="reset-btn" onclick="resetFilter()">Pokaż wszystko</button>
        </div>

        <div id="status" class="loader">Pobieranie najnowszych danych z bazy...</div>
        
        <div class="table-wrapper">
            <table id="priceTable" style="display: none;">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            Ostatnia aktualizacja bazy: <span id="lastUpdate">--:--</span><br>
            Dane odświeżają się automatycznie co godzinę.
        </div>
    </div>

    <script>
        // --- KONFIGURACJA ---
        const API_URL = 'https://enwwdqjsxqwspvtsubou.supabase.co/rest/v1/prices?apikey=sb_publishable_n_ms66jti5mt9p_9H0cDAg_rA-4IiFM&select=*';
        
        // UWAGA: Zmień 'name' na nazwę kolumny w Twojej bazie Supabase, która zawiera nazwę przedmiotu!
        const KOLUMNA_Z_NAZWA_PRZEDMIOTU = 'name'; 
        // --------------------

        let allPricesData = []; // Tutaj przechowujemy wszystkie dane z Supabase

        // Główna funkcja pobierająca z Supabase
        async function fetchPrices() {
            const statusEl = document.getElementById('status');
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`Błąd serwera bazy (kod: ${response.status})`);

                allPricesData = await response.json();

                if (!allPricesData || allPricesData.length === 0) {
                    statusEl.textContent = 'Baza danych jest obecnie pusta.';
                    statusEl.style.display = 'block';
                    document.getElementById('priceTable').style.display = 'none';
                    return;
                }

                // Po pobraniu od razu renderujemy całą tabelę
                renderTable(allPricesData);

                // Aktualizacja czasu
                const now = new Date();
                document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            } catch (error) {
                console.error('Błąd pobierania danych z bazy:', error);
                statusEl.innerHTML = `<div class="error">Problem z bazą danych:<br>${error.message}</div>`;
            }
        }

        // Funkcja rysująca tabelę na podstawie przekazanych danych
        function renderTable(dataToRender) {
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('priceTable');
            const theadEl = document.getElementById('tableHead');
            const tbodyEl = document.getElementById('tableBody');

            theadEl.innerHTML = '';
            tbodyEl.innerHTML = '';

            if (dataToRender.length === 0) {
                statusEl.innerHTML = '<div class="error">Brak przedmiotów do wyświetlenia.</div>';
                statusEl.style.display = 'block';
                tableEl.style.display = 'none';
                return;
            }

            // Pobieranie nazw kolumn z pierwszego elementu
            const columns = Object.keys(dataToRender[0]);
            
            // Generowanie nagłówków
            const headerRow = document.createElement('tr');
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col.replace(/_/g, ' '); 
                headerRow.appendChild(th);
            });
            theadEl.appendChild(headerRow);

            // Wypełnianie tabeli danymi
            dataToRender.forEach(item => {
                const row = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = (item[col] !== null && item[col] !== undefined) ? item[col] : '-';
                    row.appendChild(td);
                });
                tbodyEl.appendChild(row);
            });

            statusEl.style.display = 'none';
            tableEl.style.display = 'table';
        }

        // Funkcja pobierająca ekwipunek Steam i filtrująca tabelę
        async function filterBySteamInventory() {
            const steamId = document.getElementById('steamIdInput').value.trim();
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('priceTable');

            if (!steamId || steamId.length !== 17) {
                alert("Wprowadź prawidłowy, 17-cyfrowy Steam ID (np. 76561198289016347).");
                return;
            }

            tableEl.style.display = 'none';
            statusEl.style.display = 'block';
            statusEl.textContent = 'Pobieranie ekwipunku ze Steam (to może chwilę potrwać)...';

            try {
                // Używamy darmowego proxy (allorigins), aby ominąć blokadę CORS przeglądarki
                const steamUrl = `https://steamcommunity.com/inventory/${steamId}/730/2?l=english&count=2000`;
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(steamUrl)}`;

                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error('Nie udało się pobrać ekwipunku. Upewnij się, że ekwipunek jest publiczny i profil istnieje.');

                const steamData = await response.json();

                // Sprawdzamy czy użytkownik ma przedmioty
                if (!steamData || !steamData.descriptions || steamData.descriptions.length === 0) {
                    throw new Error("Ekwipunek jest pusty, prywatny lub nie masz przedmiotów w CS2.");
                }

                // Zbieramy unikalne nazwy przedmiotów gracza
                // Używamy 'market_hash_name', bo to pełna nazwa z kondycją (np. "AK-47 | Redline (Field-Tested)")
                const userOwnedItems = new Set();
                steamData.descriptions.forEach(item => {
                    if (item.market_hash_name) {
                        userOwnedItems.add(item.market_hash_name);
                    }
                });

                // Filtrujemy nasze dane z Supabase
                const filteredData = allPricesData.filter(dbItem => {
                    const itemNameInDb = dbItem[KOLUMNA_Z_NAZWA_PRZEDMIOTU];
                    // Sprawdzamy czy przedmiot z bazy znajduje się w zbiorze przedmiotów gracza
                    return userOwnedItems.has(itemNameInDb);
                });

                renderTable(filteredData);

            } catch (error) {
                console.error('Błąd Steam API:', error);
                statusEl.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        // Funkcja powrotu do pełnej listy
        function resetFilter() {
            document.getElementById('steamIdInput').value = '';
            renderTable(allPricesData);
        }

        // Inicjalizacja
        fetchPrices();
        setInterval(fetchPrices, 3600000); // Odświeżaj z bazy co godzinę
    </script>
</body>
</html>
