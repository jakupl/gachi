<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prices</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
        }

        h1 { 
            text-align: center; 
            color: var(--primary-color); 
            margin-bottom: 24px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }

        th, td { 
            padding: 14px 16px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
        }

        th { 
            background-color: var(--primary-color); 
            color: white; 
            font-weight: 600;
            text-transform: capitalize;
        }

        tr:hover { 
            background-color: #f1f5f9; 
        }

        .loader { 
            text-align: center; 
            padding: 40px; 
            font-size: 1.1em;
            color: #64748b; 
        }

        .error { 
            color: #ef4444; 
            text-align: center; 
            padding: 20px;
            font-weight: bold; 
            background-color: #fef2f2;
            border-radius: 8px;
        }

        .footer { 
            text-align: center; 
            margin-top: 24px; 
            font-size: 0.9em; 
            color: #64748b; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Panel Aktualnych Cen</h1>
        
        <div id="status" class="loader">Pobieranie najnowszych danych...</div>
        
        <div class="table-wrapper">
            <table id="priceTable" style="display: none;">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            Ostatnia aktualizacja: <span id="lastUpdate">--:--</span><br>
            Dane odświeżają się automatycznie co godzinę.
        </div>
    </div>

    <script>
        // Twój link do API Supabase
        const API_URL = 'https://enwwdqjsxqwspvtsubou.supabase.co/rest/v1/prices?apikey=sb_publishable_n_ms66jti5mt9p_9H0cDAg_rA-4IiFM&select=*';

        async function fetchPrices() {
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('priceTable');
            const theadEl = document.getElementById('tableHead');
            const tbodyEl = document.getElementById('tableBody');
            const lastUpdateEl = document.getElementById('lastUpdate');

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`Błąd serwera (kod: ${response.status})`);
                }

                const data = await response.json();

                if (!data || data.length === 0) {
                    statusEl.textContent = 'Baza danych jest obecnie pusta.';
                    statusEl.style.display = 'block';
                    tableEl.style.display = 'none';
                    return;
                }

                // Czyszczenie tabeli przed nałożeniem nowych danych
                theadEl.innerHTML = '';
                tbodyEl.innerHTML = '';

                // Pobieranie nazw kolumn z pierwszego elementu
                const columns = Object.keys(data[0]);
                
                // Generowanie nagłówków tabeli
                const headerRow = document.createElement('tr');
                columns.forEach(col => {
                    const th = document.createElement('th');
                    // Zamiana np. "item_price" na "Item price" dla lepszego wyglądu
                    th.textContent = col.replace(/_/g, ' '); 
                    headerRow.appendChild(th);
                });
                theadEl.appendChild(headerRow);

                // Wypełnianie tabeli danymi
                data.forEach(item => {
                    const row = document.createElement('tr');
                    columns.forEach(col => {
                        const td = document.createElement('td');
                        // Jeśli wartość to null, wstaw znak "-"
                        td.textContent = (item[col] !== null && item[col] !== undefined) ? item[col] : '-';
                        row.appendChild(td);
                    });
                    tbodyEl.appendChild(row);
                });

                // Pokazanie tabeli i ukrycie loadera
                statusEl.style.display = 'none';
                tableEl.style.display = 'table';
                
                // Aktualizacja czasu
                const now = new Date();
                lastUpdateEl.textContent = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            } catch (error) {
                console.error('Błąd pobierania danych:', error);
                statusEl.innerHTML = `<div class="error">Wystąpił problem z pobraniem danych:<br>${error.message}</div>`;
                statusEl.style.display = 'block';
                tableEl.style.display = 'none';
            }
        }

        fetchPrices();

        setInterval(fetchPrices, 3600000);
    </script>
</body>
</html>
