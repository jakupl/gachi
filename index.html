<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Price Checker & Inventory</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --error-bg: #fef2f2;
            --error-text: #ef4444;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            line-height: 1.5;
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }

        h1 { 
            text-align: center; 
            margin-top: 0;
            color: var(--primary);
            font-size: 2rem;
        }

        /* Sekcja Steam ID */
        .search-section {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 320px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--text-muted); color: white; }
        .btn-secondary:hover { background: #475569; }

        /* Tabela */
        .table-container { overflow-x: auto; margin-top: 20px; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left;
        }

        th { 
            background: var(--bg); 
            padding: 16px; 
            font-weight: 600; 
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        td { padding: 16px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #f8fafc; }

        /* Komunikaty */
        .status-box {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            display: none;
        }

        .loader { color: var(--text-muted); font-style: italic; }
        .error { background: var(--error-bg); color: var(--error-text); border: 1px solid #fee2e2; display: block; }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            input { width: 100%; }
            .search-section { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Market Watcher</h1>

    <div class="search-section">
        <input type="text" id="steamIdInput" placeholder="Wklej Steam ID (np. 76561198289016347)">
        <button class="btn-primary" onclick="loadUserInventory()">Filtruj mój ekwipunek</button>
        <button class="btn-secondary" onclick="resetView()">Pokaż wszystkie</button>
    </div>

    <div id="statusMessage" class="status-box"></div>

    <div class="table-container">
        <table id="mainTable" style="display: none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer">
        Ostatnia aktualizacja cen: <span id="updateTime">--:--:--</span><br>
        Dane z Supabase odświeżane automatycznie co 60 minut.
    </div>
</div>

<script>
    // --- KONFIGURACJA ---
    const SUPABASE_URL = 'https://enwwdqjsxqwspvtsubou.supabase.co/rest/v1/prices?apikey=sb_publishable_n_ms66jti5mt9p_9H0cDAg_rA-4IiFM&select=*';
    
    // ZMIEŃ TO: Wpisz nazwę kolumny z Twojej bazy Supabase, która zawiera nazwę przedmiotu (np. 'name' lub 'item_name')
    const DB_NAME_COLUMN = 'name'; 

    let cachedPrices = [];

    // 1. Pobieranie danych z Supabase
    async function fetchDatabase() {
        showStatus("Pobieranie danych z bazy...", "loader");
        try {
            const response = await fetch(SUPABASE_URL);
            if (!response.ok) throw new Error("Błąd połączenia z bazą danych.");
            
            cachedPrices = await response.json();
            renderTable(cachedPrices);
            
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
            hideStatus();
        } catch (err) {
            showStatus("❌ Nie udało się załadować bazy cen: " + err.message, "error");
        }
    }

    // 2. Pobieranie ekwipunku Steam i filtrowanie
    async function loadUserInventory() {
        const steamId = document.getElementById('steamIdInput').value.trim();
        
        if (!steamId || steamId.length < 16) {
            alert("Proszę podać poprawny 17-cyfrowy Steam ID.");
            return;
        }

        showStatus("⏳ Łączenie ze Steam (przez Proxy)...", "loader");

        try {
            // Używamy stabilnego proxy corsproxy.io
            const steamUrl = `https://steamcommunity.com/inventory/${steamId}/730/2?l=english&count=2000`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(steamUrl)}`;

            const response = await fetch(proxyUrl);
            
            if (!response.ok) {
                if (response.status === 403) throw new Error("Ekwipunek jest PRYWATNY. Zmień ustawienia na Steam.");
                if (response.status === 429) throw new Error("Steam blokuje zapytanie (Rate Limit). Spróbuj za chwilę.");
                throw new Error("Steam nie odpowiedział poprawnie.");
            }

            const data = await response.json();
            
            if (!data.descriptions) throw new Error("Nie znaleziono przedmiotów w ekwipunku.");

            // Tworzymy listę nazw przedmiotów, które posiada gracz
            const inventoryNames = new Set(data.descriptions.map(i => i.market_hash_name));

            // Filtrujemy dane z bazy
            const filtered = cachedPrices.filter(item => inventoryNames.has(item[DB_NAME_COLUMN]));

            if (filtered.length === 0) {
                showStatus("ℹ️ Masz publiczny ekwipunek, ale żadnego z Twoich przedmiotów nie ma w naszej bazie cen.", "loader");
                document.getElementById('mainTable').style.display = 'none';
            } else {
                renderTable(filtered);
                hideStatus();
            }

        } catch (err) {
            showStatus("❌ Błąd: " + err.message, "error");
        }
    }

    // 3. Renderowanie tabeli
    function renderTable(data) {
        const table = document.getElementById('mainTable');
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');

        head.innerHTML = "";
        body.innerHTML = "";

        if (data.length === 0) return;

        const cols = Object.keys(data[0]);

        // Nagłówki
        const trHead = document.createElement('tr');
        cols.forEach(c => {
            const th = document.createElement('th');
            th.textContent = c.replace(/_/g, ' ');
            trHead.appendChild(th);
        });
        head.appendChild(trHead);

        // Wiersze
        data.forEach(row => {
            const tr = document.createElement('tr');
            cols.forEach(c => {
                const td = document.createElement('td');
                td.textContent = row[c] ?? "-";
                tr.appendChild(td);
            });
            body.appendChild(tr);
        });

        table.style.display = "table";
    }

    function resetView() {
        document.getElementById('steamIdInput').value = "";
        renderTable(cachedPrices);
        hideStatus();
    }

    function showStatus(msg, type) {
        const el = document.getElementById('statusMessage');
        el.className = `status-box ${type}`;
        el.innerHTML = msg;
        el.style.display = "block";
    }

    function hideStatus() {
        document.getElementById('statusMessage').style.display = "none";
    }

    // Inicjalizacja i pętla odświeżania (1h = 3600000ms)
    fetchDatabase();
    setInterval(fetchDatabase, 3600000);
</script>

</body>
</html>
