<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prices Panel</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
        }

        h1 { 
            text-align: center; 
            color: var(--primary-color); 
            margin-bottom: 24px;
        }

        .search-container {
            margin-bottom: 20px;
            display: none; 
        }

        #searchInput {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        #searchInput:focus {
            border-color: var(--primary-color);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }

        th, td { 
            padding: 14px 16px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-color); 
        }

        th { 
            background-color: var(--primary-color); 
            color: white; 
            font-weight: 600;
            text-transform: capitalize;
        }

        tr:hover { 
            background-color: #f1f5f9; 
        }

        .loader { 
            text-align: center; 
            padding: 40px; 
            font-size: 1.1em;
            color: #64748b; 
        }

        .error { 
            color: #ef4444; 
            text-align: center; 
            padding: 20px;
            font-weight: bold; 
            background-color: #fef2f2;
            border-radius: 8px;
        }

        .footer { 
            text-align: center; 
            margin-top: 24px; 
            font-size: 0.9em; 
            color: #64748b; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Current Prices Panel</h1>
        
        <div id="status" class="loader">Fetching latest data...</div>
        
        <div id="searchContainer" class="search-container">
            <input type="text" id="searchInput" placeholder="Search for items...">
        </div>

        <div class="table-wrapper">
            <table id="priceTable" style="display: none;">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            Last update: <span id="lastUpdate">--:--</span><br><br>
            Data refreshes automatically every hour.
        </div>
    </div>

    <script>
        const API_URL = 'https://enwwdqjsxqwspvtsubou.supabase.co/rest/v1/prices?apikey=sb_publishable_n_ms66jti5mt9p_9H0cDAg_rA-4IiFM&select=*';
        
        let allData = [];

        async function fetchPrices() {
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('priceTable');
            const searchContainer = document.getElementById('searchContainer');
            const lastUpdateEl = document.getElementById('lastUpdate');

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`Server error (code: ${response.status})`);
                }

                allData = await response.json();

                if (!allData || allData.length === 0) {
                    statusEl.textContent = 'The database is currently empty.';
                    statusEl.style.display = 'block';
                    tableEl.style.display = 'none';
                    searchContainer.style.display = 'none';
                    return;
                }

                statusEl.style.display = 'none';
                searchContainer.style.display = 'block';
                tableEl.style.display = 'table';
                
                renderTable(allData);

                const now = new Date();
                lastUpdateEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            } catch (error) {
                console.error('Data fetching error:', error);
                statusEl.innerHTML = `<div class="error">There was a problem fetching the data:<br>${error.message}</div>`;
                statusEl.style.display = 'block';
                tableEl.style.display = 'none';
                searchContainer.style.display = 'none';
            }
        }

        function renderTable(dataToDisplay) {
            const theadEl = document.getElementById('tableHead');
            const tbodyEl = document.getElementById('tableBody');
            
            theadEl.innerHTML = '';
            tbodyEl.innerHTML = '';

            if (dataToDisplay.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 100;
                td.textContent = 'No matching items found.';
                td.style.textAlign = 'center';
                tr.appendChild(td);
                tbodyEl.appendChild(tr);
                return;
            }

            const columns = Object.keys(allData[0]);
            
            const headerRow = document.createElement('tr');
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col.replace(/_/g, ' '); 
                headerRow.appendChild(th);
            });
            theadEl.appendChild(headerRow);

            dataToDisplay.forEach(item => {
                const row = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    let rawValue = item[col];
                    
                    if (typeof rawValue === 'number') {
                        td.textContent = rawValue.toFixed(2);
                    } else {
                        td.textContent = (rawValue !== null && rawValue !== undefined) ? rawValue : '-';
                    }
                    
                    row.appendChild(td);
                });
                tbodyEl.appendChild(row);
            });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            
            const filteredData = allData.filter(item => {
                return Object.values(item).some(value => 
                    String(value).toLowerCase().includes(searchTerm)
                );
            });
            
            renderTable(filteredData);
        });

        fetchPrices();
        setInterval(fetchPrices, 3600000);
    </script>
</body>
</html>
